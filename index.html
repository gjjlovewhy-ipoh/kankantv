// 解析频道数组
let channels = channelList.trim().split('\n').map(line=>{
    let [name,url] = line.split(',');
    return {name:name.trim(),url:url.trim()};
});

const video = document.getElementById('tvPlayer');
const container = document.getElementById('channelContainer');
let nowPlayUrl = "";

// 渲染频道列表
function renderChannels(){
    // 分组简单归类
    let group1 = channels.filter(item=>item.name.includes('CCTV')||item.name.includes('CGTN'));
    let group2 = channels.filter(item=>!group1.find(g=>g.name===item.name) && (item.name.includes('卫视')&&!item.name.includes('高清')));
    let group3 = channels.filter(item=>item.name.includes('高清'));
    let group4 = channels.filter(item=>!group1.find(g=>g.name===item.name)&&!group2.find(g=>g.name===item.name)&&!group3.find(g=>g.name===item.name));

    renderGroup('央视频道',group1);
    renderGroup('省市卫视',group2);
    renderGroup('高清频道',group3);
    renderGroup('地方影视',group4);

    // 默认自动播放 CCTV-13
    let cctv13 = channels.find(x=>x.name==='CCTV-13');
    if(cctv13){
        playChannel(cctv13.url);
    }
}

// 渲染单个分组
function renderGroup(title,list){
    let html = `<div class="cat-title">${title}</div><div class="channel-box">`;
    list.forEach(item=>{
        html += `<div class="item" data-url="${item.url}">${item.name}</div>`;
    });
    html += `</div>`;
    container.innerHTML += html;
}

// 播放频道
function playChannel(url){
    nowPlayUrl = url;
    video.src = url;
    video.play();
    // 高亮当前播放
    document.querySelectorAll('.item').forEach(el=>{
        el.classList.remove('active');
        if(el.dataset.url === url){
            el.classList.add('active');
        }
    });
}

// 绑定点击事件
document.addEventListener('click',e=>{
    if(e.target.classList.contains('item')){
        playChannel(e.target.dataset.url);
    }
});

// 初始化
renderChannels();
</script>
